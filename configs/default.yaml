project:
  name: FutureLink HGT
  status: Under Active Development

data:
  raw_dir: data/raw
  processed_dir: data/processed
  feature_dim: 64

model:
  hidden_dim: 64
  output_dim: 64
  heads: 2
  layers: 2
  dropout: 0.2

training:
  epochs: 100
  learning_rate: 0.001
  weight_decay: 0.0001
  negative_ratio: 1.0
  seed: 42

evaluation:
  top_k: [10, 50]
